<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo 黑金色测试</title>
<style>
  body { font-family: 'Noto Sans SC', sans-serif; background: #16140F; color: #E8E4DC; padding: 40px; }
  h1 { color: #C8A96E; font-size: 22px; margin-bottom: 8px; }
  .sub { color: #8A857C; font-size: 14px; margin-bottom: 32px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; }
  .card { background: #1E1C18; border: 1px solid #2A2824; border-radius: 12px; padding: 24px; text-align: center; }
  .card h3 { color: #8A857C; font-size: 13px; margin-bottom: 16px; }
  .card .bg-dark { background: #0C0B08; padding: 32px; border-radius: 8px; }
  .card .bg-cover { background: linear-gradient(135deg, #0C0B08 0%, #1a1710 100%); padding: 32px; border-radius: 8px; }
  .card img { max-width: 200px; height: auto; }
  .info { font-size: 12px; color: #8A857C; margin-top: 12px; }

  /* Gold filters */
  .filter-gold1 { filter: sepia(100%) saturate(300%) hue-rotate(345deg) brightness(0.9); }
  .filter-gold2 { filter: sepia(100%) saturate(400%) hue-rotate(350deg) brightness(0.85); }
  .filter-gold3 { filter: sepia(80%) saturate(500%) hue-rotate(340deg) brightness(0.9) contrast(1.1); }
  .filter-gold4 { filter: sepia(100%) saturate(250%) hue-rotate(355deg) brightness(0.95) drop-shadow(0 0 8px rgba(200,169,110,0.4)); }

  .swatch { display: inline-block; width: 16px; height: 16px; border-radius: 3px; vertical-align: middle; margin-right: 6px; }
  .swatch-gold { background: #C8A96E; }
</style>
</head>
<body>
<h1>Logo 黑金色转换测试</h1>
<p class="sub">原始 logo → 4 种 CSS filter 方案（目标色 <span class="swatch swatch-gold"></span> #C8A96E）</p>

<div class="cards">
  <div class="card">
    <h3>原始 Logo（无滤镜）</h3>
    <div class="bg-dark">
      <img src="../logo.png" alt="原始">
    </div>
    <div class="info">作为对照</div>
  </div>
  <div class="card">
    <h3>方案 1：标准金</h3>
    <div class="bg-dark">
      <img src="../logo.png" alt="方案1" class="filter-gold1">
    </div>
    <div class="info">sepia + saturate + hue-rotate</div>
  </div>
  <div class="card">
    <h3>方案 2：暗金</h3>
    <div class="bg-dark">
      <img src="../logo.png" alt="方案2" class="filter-gold2">
    </div>
    <div class="info">更暗、更厚重</div>
  </div>
  <div class="card">
    <h3>方案 3：亮金</h3>
    <div class="bg-dark">
      <img src="../logo.png" alt="方案3" class="filter-gold3">
    </div>
    <div class="info">高饱和、偏暖</div>
  </div>
  <div class="card">
    <h3>方案 4：金+发光</h3>
    <div class="bg-dark">
      <img src="../logo.png" alt="方案4" class="filter-gold4">
    </div>
    <div class="info">带金色光晕</div>
  </div>
</div>
</body>
</html>
